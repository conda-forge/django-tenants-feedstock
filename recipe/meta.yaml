{% set name = "django-tenants" %}
{% set version = "3.10.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 1d696911989c330218dccb9da8bc0b4caa5512e02b675c82dd991cad95573105

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - django >=2.1,<6.1
    # - psycopg <3.3,>=3.2.1
    # - gunicorn ==23
    # - coverage 
    # - psycopg <3.3,>=3.2.1
    # - gunicorn ==23
    # - coverage 
    # - psycopg <3.3,>=3.2.1
    # - gunicorn ==25.1.0
    # - coverage 

test:
  imports:
    - django_tenants
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/django-tenants/django-tenants
  summary: Tenant support for Django using PostgreSQL schemas.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
